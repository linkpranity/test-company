<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面 | LINKPRANITY</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#0D9E8E;--teal-dark:#0A7A6E;--teal-deep:#0F4C5C;
  --teal-light:#E6F7F5;--teal-border:#A7DED9;
  --ink:#1A2E35;--gray-50:#F7FAFA;--gray-100:#EDF3F3;
  --gray-200:#D4E2E1;--gray-400:#8BADB0;--gray-500:#5F868A;--gray-700:#2E5156;
  --white:#FFFFFF;--red:#DC2626;--red-light:#FEF2F2;
  --amber:#D97706;--amber-light:#FFFBEB;
  --radius:14px;--shadow:0 1px 4px rgba(13,158,142,.08),0 4px 18px rgba(13,158,142,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP','Hiragino Kaku Gothic Pro',sans-serif;background:var(--gray-50);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ログイン */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-card{background:var(--white);border:1px solid var(--gray-200);border-radius:20px;box-shadow:var(--shadow);padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center}
.login-logo{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:1.5rem}
.login-logo-arrow{color:var(--teal);font-size:18px;font-weight:900}
.login-logo-text{color:var(--teal-deep);font-size:14px;font-weight:700;letter-spacing:.08em}
.login-card h2{font-size:17px;font-weight:700;color:var(--teal-deep);margin-bottom:.4rem}
.login-card .login-desc{font-size:13px;color:var(--gray-400);margin-bottom:1.75rem}
.login-field{text-align:left;margin-bottom:1rem}
.login-field label{display:block;font-size:12px;font-weight:700;color:var(--gray-500);margin-bottom:.4rem}
.pw-wrap{position:relative}
.login-input{width:100%;border:1.5px solid var(--gray-200);border-radius:8px;padding:.7rem 3rem .7rem 1rem;font-size:15px;font-family:inherit;color:var(--ink);background:var(--white);transition:border-color .2s}
.login-input:focus{outline:none;border-color:var(--teal)}
.pw-toggle{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;line-height:1;font-size:17px;color:var(--gray-400)}
.pw-toggle:hover{color:var(--teal)}
.login-btn{width:100%;background:var(--teal);color:#fff;border:none;border-radius:30px;padding:.8rem;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s;margin-top:.25rem}
.login-btn:hover{background:var(--teal-dark)}
.login-error{color:var(--red);font-size:13px;margin-top:.75rem;display:none}
.login-note{font-size:11px;color:var(--gray-400);margin-top:1rem}

/* メイン */
.header{background:var(--teal-deep);padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:.6rem}
.logo-arrow{color:var(--teal);font-size:15px;font-weight:900}
.logo-text{color:#fff;font-size:13px;font-weight:700;letter-spacing:.08em}
.logo-sep{color:rgba(255,255,255,.3);font-size:12px}
.logo-sub{color:rgba(255,255,255,.6);font-size:12px}
.admin-badge{background:rgba(255,255,255,.15);color:#fff;font-size:11px;padding:.2rem .65rem;border-radius:20px;font-weight:700;border:1px solid rgba(255,255,255,.2)}
.container{max-width:800px;margin:0 auto;padding:1.75rem 1rem 5rem}
.update-time{font-size:11px;color:var(--gray-400);text-align:right;margin-bottom:1rem}

.stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:.75rem;margin-bottom:1.5rem}
.stat-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:1.25rem 1rem;text-align:center;box-shadow:var(--shadow)}
.stat-card.danger{border-color:#fca5a5;background:var(--red-light)}
.stat-card.warn{border-color:#fcd34d;background:var(--amber-light)}
.stat-card.teal{border-color:var(--teal-border);background:var(--teal-light)}
.stat-icon{font-size:20px;margin-bottom:.35rem}
.stat-val{font-size:30px;font-weight:700;color:var(--teal-deep);line-height:1}
.stat-val.red{color:var(--red)}
.stat-val.amber{color:var(--amber)}
.stat-lbl{font-size:11px;color:var(--gray-500);margin-top:.35rem;line-height:1.4}

.tab-wrap{display:flex;gap:.35rem;margin-bottom:1.25rem;border-bottom:2px solid var(--teal-light);padding-bottom:.75rem}
.tab-btn{padding:.45rem 1rem;border-radius:30px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--gray-200);background:var(--white);color:var(--gray-500);font-family:inherit;transition:all .15s}
.tab-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.tab-btn:hover:not(.active){border-color:var(--teal-border);color:var(--teal)}

.section-title{font-size:12px;font-weight:700;color:var(--teal);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:2px solid var(--teal-light)}
.card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--teal-deep);margin-bottom:1rem}

.bar-row{display:flex;align-items:center;gap:.75rem;margin:.35rem 0}
.bar-label{font-size:12px;color:var(--gray-700);min-width:110px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:9px;background:var(--gray-100);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width .5s ease}
.bar-count{font-size:12px;font-weight:700;color:var(--gray-500);min-width:32px;text-align:right;flex-shrink:0}

.ring-wrap{display:flex;align-items:center;gap:1.5rem}
.ring-val{font-size:38px;font-weight:700;color:var(--teal-deep)}
.ring-lbl{font-size:13px;color:var(--gray-500);margin-top:.2rem}

.alert-item{display:flex;align-items:flex-start;gap:.75rem;padding:.85rem 1rem;border-radius:8px;margin-bottom:.6rem;border:1px solid}
.alert-item.red{background:var(--red-light);border-color:#fca5a5}
.alert-item.amber{background:var(--amber-light);border-color:#fcd34d}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:.1rem}
.alert-text{font-size:13px;line-height:1.65}
.alert-text strong{font-weight:700;display:block;margin-bottom:.2rem}

.resp-card{border:1px solid var(--gray-200);border-radius:8px;padding:.85rem 1rem;margin-bottom:.5rem;cursor:pointer;transition:border-color .15s}
.resp-card:hover{border-color:var(--teal)}
.resp-card.red-border{border-left:4px solid var(--red)}
.resp-card.amber-border{border-left:4px solid var(--amber)}
.resp-num{font-size:13px;font-weight:700;color:var(--teal-deep)}
.resp-time{font-size:11px;color:var(--gray-400)}
.resp-header{display:flex;align-items:center;justify-content:space-between}
.resp-badges{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.3rem}
.badge{font-size:11px;padding:.2rem .55rem;border-radius:20px;font-weight:700}
.badge.red{background:var(--red-light);color:var(--red)}
.badge.amber{background:var(--amber-light);color:var(--amber)}
.badge.teal{background:var(--teal-light);color:var(--teal-dark)}
.resp-detail{margin-top:.85rem;display:none;border-top:1px solid var(--gray-100);padding-top:.75rem}
.resp-detail.open{display:block}
.detail-row{display:flex;gap:.75rem;padding:.3rem 0;border-bottom:1px solid var(--gray-100);font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-q{color:var(--gray-400);min-width:140px;flex-shrink:0}
.detail-a{color:var(--ink);font-weight:500}
.detail-a.red{color:var(--red)}
.detail-a.amber{color:var(--amber)}
.empty-msg{text-align:center;padding:3rem;color:var(--gray-400);font-size:14px}

@media(max-width:600px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .ring-wrap{flex-direction:column;align-items:flex-start}
  .bar-label{min-width:80px;font-size:11px}
}
</style>
</head>

<script>
// ============================================================
// パスワード設定（クライアントごとに変更してください）
// ============================================================
var ADMIN_PASSWORD = 'lp-admin2025';

// ============================================================
// ログイン処理
// ============================================================
function togglePw() {
  var input = document.getElementById('pw-input');
  var btn = document.getElementById('pw-toggle-btn');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}

function doLogin() {
  var val = document.getElementById('pw-input').value;
  if (val === ADMIN_PASSWORD) {
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('main-header').style.display = '';
    document.getElementById('main-container').style.display = '';
    render();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

document.addEventListener('DOMContentLoaded', function() {
  var input = document.getElementById('pw-input');
  if (input) {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
  }
});

// ============================================================
// 管理画面データ処理
// ============================================================
var Q_MAP = {
  tenure: '勤続年数',
  dept: '所属区分',
  relations: '人間関係',
  relations_detail: '人間関係（詳細）',
  evaluation: '評価制度',
  evaluation_detail: '評価制度（詳細）',
  workload: '業務量',
  workload_detail: '業務量（詳細）',
  stay: '継続就業意向',
  concerns: '不安・課題',
  speak_up: '言いづらいこと',
  free_comment: '自由記述',
  harassment: 'ハラスメント記述',
  incident: '気になる言動',
  consult: '個別相談希望'
};

var QUIT_SERIOUS = ['あまり思わない', '全く思わない'];
var SAT_GOOD = ['とても満足している', 'やや満足している'];

function getR() {
  return JSON.parse(localStorage.getItem('lp_responses') || '[]');
}

function colorSat(opt) {
  if (opt === 'とても満足している') return '#0D9E8E';
  if (opt === 'やや満足している') return '#38BDF8';
  if (opt === 'どちらでもない') return '#8BADB0';
  if (opt === 'やや不満') return '#D97706';
  return '#DC2626';
}

function colorStay(opt) {
  if (opt === 'とてもそう思う') return '#0D9E8E';
  if (opt === 'ややそう思う') return '#38BDF8';
  if (opt === 'あまり思わない') return '#D97706';
  return '#DC2626';
}

function barChart(title, R, key, opts, colorFn) {
  var total = R.length;
  var max = 1;
  opts.forEach(function(o) {
    var cnt = R.filter(function(r) { return r.answers[key] === o; }).length;
    if (cnt > max) max = cnt;
  });
  var h = '<div class="card-title">' + title + '</div>';
  opts.forEach(function(opt) {
    var cnt = R.filter(function(r) { return r.answers[key] === opt; }).length;
    h += '<div class="bar-row">'
      + '<div class="bar-label">' + opt + '</div>'
      + '<div class="bar-track"><div class="bar-fill" style="width:' + Math.round(cnt/max*100) + '%;background:' + colorFn(opt) + '"></div></div>'
      + '<div class="bar-count">' + cnt + '名</div>'
      + '</div>';
  });
  return h;
}

function render() {
  var R = getR();
  var total = R.length;
  document.getElementById('update-time').textContent = '最終更新：' + new Date().toLocaleString('ja-JP');

  var harassCount = R.filter(function(r) { return r.answers.harassment && r.answers.harassment.trim(); }).length;
  var quitCount = R.filter(function(r) { return QUIT_SERIOUS.indexOf(r.answers.stay) >= 0; }).length;
  var consultCount = R.filter(function(r) { return r.answers.consult === 'はい、希望する'; }).length;

  document.getElementById('stat-grid').innerHTML =
    '<div class="stat-card teal"><div class="stat-icon">📋</div><div class="stat-val">' + total + '</div><div class="stat-lbl">総回答数</div></div>' +
    '<div class="stat-card ' + (harassCount > 0 ? 'danger' : '') + '"><div class="stat-icon">⚠️</div><div class="stat-val ' + (harassCount > 0 ? 'red' : '') + '">' + harassCount + '</div><div class="stat-lbl">ハラスメント記述あり</div></div>' +
    '<div class="stat-card ' + (quitCount > 0 ? 'warn' : '') + '"><div class="stat-icon">🚪</div><div class="stat-val ' + (quitCount > 0 ? 'amber' : '') + '">' + quitCount + '</div><div class="stat-lbl">離職懸念あり</div></div>' +
    '<div class="stat-card"><div class="stat-icon">📞</div><div class="stat-val">' + consultCount + '</div><div class="stat-lbl">個別相談希望</div></div>';

  var satOpts = ['とても満足している', 'やや満足している', 'どちらでもない', 'やや不満', 'とても不満'];
  document.getElementById('card-relations').innerHTML = barChart('人間関係（Q3）', R, 'relations', satOpts, colorSat);
  document.getElementById('card-workload').innerHTML = barChart('業務量（Q5）', R, 'workload', satOpts, colorSat);
  document.getElementById('card-stay').innerHTML = barChart('継続就業意向（Q6）', R, 'stay',
    ['とてもそう思う', 'ややそう思う', 'あまり思わない', '全く思わない'], colorStay);

  // リングチャート
  var goodCnt = R.filter(function(r) { return SAT_GOOD.indexOf(r.answers.relations) >= 0; }).length;
  var goodPct = total > 0 ? Math.round(goodCnt / total * 100) : 0;
  var r2 = 45, cx = 60, cy = 60, circ = 2 * Math.PI * r2;
  var offset = circ - (goodPct / 100) * circ;
  document.getElementById('card-ring').innerHTML =
    '<div class="ring-wrap">' +
    '<svg width="120" height="120" viewBox="0 0 120 120">' +
    '<circle cx="' + cx + '" cy="' + cy + '" r="' + r2 + '" fill="none" stroke="#D4E2E1" stroke-width="12"/>' +
    '<circle cx="' + cx + '" cy="' + cy + '" r="' + r2 + '" fill="none" stroke="#0D9E8E" stroke-width="12"' +
    ' stroke-dasharray="' + circ + '" stroke-dashoffset="' + offset + '"' +
    ' stroke-linecap="round" transform="rotate(-90 ' + cx + ' ' + cy + ')"/>' +
    '<text x="' + cx + '" y="' + cy + '" text-anchor="middle" dominant-baseline="middle" font-size="17" font-weight="700" fill="#0F4C5C">' + goodPct + '%</text>' +
    '</svg>' +
    '<div><div class="ring-val">' + goodPct + '%</div>' +
    '<div class="ring-lbl">人間関係「満足」の割合<br>（「とても満足」＋「やや満足」）</div>' +
    '<div style="font-size:12px;margin-top:.6rem">' + (goodPct >= 70 ? '✅ 良好な状態です' : goodPct >= 50 ? '⚠️ 注意が必要です' : '🔴 改善が必要です') + '</div>' +
    '</div></div>';

  // 不安・課題
  var cOpts = ['ハラスメント', '人間関係', '評価制度', '給与・待遇', '業務量', '経営方針', 'コンプライアンス', '情報共有不足', '将来への不安', 'その他'];
  var counts = {};
  cOpts.forEach(function(o) { counts[o] = 0; });
  R.forEach(function(r) {
    if (Array.isArray(r.answers.concerns)) {
      r.answers.concerns.forEach(function(c) { if (counts[c] !== undefined) counts[c]++; });
    }
  });
  var sorted = cOpts.slice().sort(function(a, b) { return counts[b] - counts[a]; }).filter(function(o) { return counts[o] > 0; });
  var maxC = 1;
  sorted.forEach(function(o) { if (counts[o] > maxC) maxC = counts[o]; });
  var cHtml = '<div class="card-title">不安・課題（Q7 複数選択）</div>';
  if (sorted.length === 0) {
    cHtml += '<p style="font-size:13px;color:var(--gray-400)">まだデータがありません</p>';
  } else {
    sorted.forEach(function(opt) {
      var color = opt === 'ハラスメント' ? '#DC2626' : opt === '人間関係' ? '#D97706' : '#0D9E8E';
      cHtml += '<div class="bar-row"><div class="bar-label">' + opt + '</div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + Math.round(counts[opt]/maxC*100) + '%;background:' + color + '"></div></div>' +
        '<div class="bar-count">' + counts[opt] + '名</div></div>';
    });
  }
  document.getElementById('card-concerns').innerHTML = cHtml;

  // アラート
  var aHtml = '';
  if (harassCount === 0 && quitCount === 0) {
    aHtml = '<div class="card"><p style="font-size:14px;color:var(--gray-400);text-align:center;padding:1.5rem">現在、要対応のアラートはありません</p></div>';
  }
  if (harassCount > 0) {
    aHtml += '<div class="alert-item red"><div class="alert-icon">🔴</div><div class="alert-text"><strong>ハラスメント記述あり（' + harassCount + '件）</strong>Q10にハラスメントや重大な懸念の記述があります。個別回答タブより内容を確認し、必要に応じてエムオーソリューションに連携してください。</div></div>';
    R.filter(function(r) { return r.answers.harassment && r.answers.harassment.trim(); }).forEach(function(r) {
      aHtml += '<div class="card" style="margin-left:1rem;border-left:4px solid var(--red)"><div class="resp-time">回答 #' + (R.indexOf(r)+1) + ' ・ ' + r.time + '</div><div style="margin-top:.5rem;font-size:13px;color:var(--red)">' + r.answers.harassment + '</div></div>';
    });
  }
  if (quitCount > 0) {
    aHtml += '<div class="alert-item amber" style="margin-top:.75rem"><div class="alert-icon">⚠️</div><div class="alert-text"><strong>離職懸念者あり（' + quitCount + '名）</strong>Q6で「あまり思わない」「全く思わない」を選択した回答があります。クライアント人事担当者に報告し、面談実施を推奨します。</div></div>';
    R.filter(function(r) { return QUIT_SERIOUS.indexOf(r.answers.stay) >= 0; }).forEach(function(r) {
      aHtml += '<div class="card" style="margin-left:1rem;border-left:4px solid var(--amber)"><div class="resp-time">回答 #' + (R.indexOf(r)+1) + ' ・ ' + r.time + '</div>' +
        '<div style="margin-top:.5rem;font-size:13px"><strong>Q6：</strong><span style="color:var(--amber)">' + r.answers.stay + '</span></div>' +
        (r.answers.free_comment ? '<div style="margin-top:.3rem;font-size:13px"><strong>自由記述：</strong>' + r.answers.free_comment + '</div>' : '') + '</div>';
    });
  }
  document.getElementById('alerts-content').innerHTML = aHtml;

  // 個別回答
  if (R.length === 0) {
    document.getElementById('resp-list').innerHTML = '<div class="card empty-msg">まだ回答がありません。<br>index.htmlでアンケートに回答するとここに表示されます。</div>';
    return;
  }
  var dHtml = '';
  var reversed = R.slice().reverse();
  reversed.forEach(function(r, ri) {
    var idx = R.length - ri;
    var hasH = !!(r.answers.harassment && r.answers.harassment.trim());
    var hasQ = QUIT_SERIOUS.indexOf(r.answers.stay) >= 0;
    var cls = 'resp-card' + (hasH ? ' red-border' : hasQ ? ' amber-border' : '');
    var badges = '';
    if (hasH) badges += '<span class="badge red">ハラスメント記述</span>';
    if (hasQ) badges += '<span class="badge amber">離職懸念</span>';
    if (r.answers.consult === 'はい、希望する') badges += '<span class="badge amber">相談希望</span>';
    if (!hasH && !hasQ && r.answers.consult !== 'はい、希望する') badges += '<span class="badge teal">異常なし</span>';

    var detailRows = '';
    Object.keys(Q_MAP).forEach(function(k) {
      if (r.answers[k] === undefined || r.answers[k] === '') return;
      var val = Array.isArray(r.answers[k]) ? r.answers[k].join('、') : r.answers[k];
      var ac = 'detail-a';
      if (k === 'harassment' && val.trim()) ac += ' red';
      if (k === 'stay' && QUIT_SERIOUS.indexOf(val) >= 0) ac += ' amber';
      detailRows += '<div class="detail-row"><div class="detail-q">' + Q_MAP[k] + '</div><div class="' + ac + '">' + val + '</div></div>';
    });

    dHtml += '<div class="' + cls + '" id="rc-' + idx + '" onclick="toggleD(' + idx + ')">' +
      '<div class="resp-header">' +
      '<div><div class="resp-num">回答 #' + idx + '</div><div class="resp-time">' + r.time + '</div></div>' +
      '<div style="font-size:12px;color:var(--gray-500)">' + (r.answers.tenure || '') + ' / ' + (r.answers.dept || '') + '</div>' +
      '</div>' +
      '<div class="resp-badges">' + badges + '</div>' +
      '<div class="resp-detail" id="rd-' + idx + '">' + detailRows + '</div>' +
      '</div>';
  });
  document.getElementById('resp-list').innerHTML = dHtml;
}

function toggleD(idx) {
  document.getElementById('rd-' + idx).classList.toggle('open');
}

function switchTab(tab) {
  ['overview', 'alerts', 'detail'].forEach(function(t) {
    document.getElementById('view-' + t).style.display = t === tab ? 'block' : 'none';
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
}
</script>
</body>
</html>
